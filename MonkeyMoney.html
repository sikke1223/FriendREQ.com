<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonkeyMoney - Complete Earning Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6f42c1;
            --secondary: #20c997;
            --light: #f8f9fa;
            --dark: #212529;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            padding-bottom: 50px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .navbar {
            background: linear-gradient(135deg, var(--primary), #5a32a3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .card {
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            border: none;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            overflow: hidden;
            background: white;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.12);
        }
        
        .card-header {
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), #5a32a3);
            color: white;
            border-bottom: none;
        }
        
        .balance-card {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
        }
        
        .deposit-card {
            background: linear-gradient(135deg, #e0f7fa, #bbdefb);
        }
        
        .withdraw-card {
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
        }
        
        .referral-card {
            background: linear-gradient(135deg, #f5e6ff, #e9d4ff);
        }
        
        .plan-card {
            background: linear-gradient(135deg, #fff9f0, #ffecb3);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #5a32a3);
            border: none;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success), #1e7e34);
            border: none;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #e0a800);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            color: var(--dark);
        }
        
        .feature-icon {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 15px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            max-width: 350px;
        }
        
        .dashboard-icon {
            font-size: 1.8rem;
            margin-right: 10px;
            color: var(--primary);
        }
        
        .transaction-table {
            font-size: 0.9rem;
        }
        
        .transaction-table th {
            background-color: rgba(111, 66, 193, 0.1);
        }
        
        .badge-pill {
            border-radius: 20px;
            padding: 5px 12px;
            font-weight: 500;
        }
        
        .admin-control-panel {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .amount-display {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary);
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }
        
        .plan-highlight {
            border: 2px solid var(--primary);
            transform: scale(1.05);
            z-index: 10;
        }
        
        .network-tree {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            min-height: 300px;
            overflow: auto;
        }
        
        .user-node {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 10px;
            margin: 5px;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        
        /* OTP Verification Styles */
        .otp-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s;
        }
        
        .otp-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 5px rgba(111, 66, 193, 0.5);
        }
        
        .verification-card {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }
        
        .countdown {
            font-size: 1.2rem;
            margin: 15px 0;
            color: var(--primary);
            font-weight: bold;
        }
        
        /* Verification Status */
        .verification-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            background-color: #f8f9fa;
        }
        
        .status-icon {
            font-size: 1.5rem;
        }
        
        .status-verified {
            color: var(--success);
        }
        
        .status-pending {
            color: var(--warning);
        }
        
        /* Navigation Menu */
        .app-menu {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .menu-item:hover {
            background-color: rgba(111, 66, 193, 0.1);
        }
        
        .menu-item.active {
            background-color: var(--primary);
            color: white;
        }
        
        .menu-item.active .menu-icon {
            color: white;
        }
        
        .menu-icon {
            font-size: 1.2rem;
            width: 30px;
            color: var(--primary);
        }
        
        /* Logo Styles */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-img {
            height: 48px;
            width: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .logo-img img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        
        .brand-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
        
        /* Enhanced logo for auth page */
        .auth-logo {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .auth-logo .logo-img {
            height: 80px;
            width: 80px;
            margin-right: 15px;
        }
        
        .auth-logo .logo-img img {
            width: 70px;
            height: 70px;
        }
    </style>
</head>

        // Notification System
        function showNotification(message, type = "success") {
            const notificationArea = document.getElementById("notificationArea");
            const alert = document.createElement("div");
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.role = "alert";
            alert.innerHTML = `

            `;
            notificationArea.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }
        
        // OTP Functions
        function generateOTP() {
            return Math.floor(100000 + Math.random() * 900000);
        }
        
        async function sendOTP(phone) {
            const otp = generateOTP();
            sessionStorage.setItem("otp", otp);
            sessionStorage.setItem("otpPhone", phone);
            
            // In a real app, send OTP via SMS service
            showNotification(`OTP sent to ${phone}: ${otp}`, "info");
            return true;
        }
        
        async function sendEmailOTP(email) {
            const otp = generateOTP();
            sessionStorage.setItem("emailOtp", otp);
            sessionStorage.setItem("otpEmail", email);
            
            // In a real app, send OTP via email service
            showNotification(`OTP sent to ${email}: ${otp}`, "info");
            return true;
        }
        
        function verifyOTP(enteredOtp) {
            const storedOtp = sessionStorage.getItem("otp");
            return enteredOtp === storedOtp;
        }
        
        function verifyEmailOTP(enteredOtp) {
            const storedOtp = sessionStorage.getItem("emailOtp");
            return enteredOtp === storedOtp;
        }
        
        // Login with OTP
        async function requestLoginOTP() {
            const phone = document.getElementById("loginPhone").value;
            
            if (!phone.match(/^03\d{9}$/)) {
                showNotification("Please enter a valid Pakistani phone number (e.g. 03XXXXXXXXX)", "danger");
                return;
            }
            
            try {
                // Check if phone exists
                const phoneSnapshot = await db.collection('users').where('phone', '==', phone).get();

                    return;

                await sendOTP(phone);

                showNotification("Error sending OTP: " + error.message, "danger");
            }
        }
        
        async function loginWithOTP() {
            const otpInputs = document.querySelectorAll('.otp-input');
            let otp = "";
            otpInputs.forEach(input => {
                otp += input.value;
            });
            
            if (otp.length !== 6) {
                showNotification("Please enter a complete 6-digit OTP", "danger");
                return;
            }
            
            if (!verifyOTP(otp)) {
                showNotification("Invalid OTP. Please try again.", "danger");
                return;
            }
            
            const phone = sessionStorage.getItem("otpPhone");
            try {
                const userDoc = await db.collection('users').where('phone', '==', phone).get();
                if (!userDoc.empty) {
                    sessionStorage.setItem("currentUserId", userDoc.docs[0].id);
                    showHome();
                    showNotification("Login successful!");
                }
            } catch (error) {
                showNotification("Login failed: " + error.message, "danger");
            }
        }
